<head>

  <style>
:root { color-scheme: light dark; --border:#d7d7d7; --muted:#666; --card:#fff; --bg:#f5f5f5; --text:#111; --hover:rgba(127,127,127,0.16); --active:rgba(127,127,127,0.24); --link-hover:#0645ad; --link-hover-bg:#eef5ff; }
@media (prefers-color-scheme: dark) { :root { --border:#333; --muted:#aaa; --card:#171717; --bg:#0e0e0e; --text:#eee; --hover:rgba(255,255,255,0.12); --active:rgba(255,255,255,0.18); --link-hover:#8cc8ff; --link-hover-bg:#10283d; } }
* { box-sizing: border-box; }
html { scroll-behavior:smooth; }
body { margin:0; font-family: Arial, Helvetica, sans-serif; background:var(--bg); color:var(--text); font-size:14px; }
header { padding:20px 24px; background:var(--card); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:2000; }
h1 { margin:0 0 8px; font-size:24px; }
nav { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
nav a { color:inherit; text-decoration:none; border:1px solid var(--border); padding:5px 8px; border-radius:999px; background:var(--bg); font-size:10px; line-height:1.2; transition:background .15s ease, border-color .15s ease, transform .15s ease; }
nav a:hover, nav a:focus { background:var(--hover); border-color:var(--muted); text-decoration:none; }
nav a.active { background:var(--active); border-color:var(--muted); font-weight:700; }
main { padding:20px; max-width:1200px; margin:0 auto; }
a { text-underline-offset:3px; }
a:hover, a:focus { text-decoration:underline; }
.summary { color:var(--muted); font-size:12px; }
.filters { display:flex; gap:8px; flex-wrap:wrap; margin:0 0 14px; }
.filters input, .filters select { padding:6px 8px; border:1px solid var(--border); border-radius:8px; min-width:170px; background:var(--card); color:var(--text); font-size:13px; }
.event-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
.card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:12px; }
.card h2 { margin:0 0 7px; font-size:16px; line-height:1.25; }
.meta { color:var(--muted); font-size:13px; line-height:1.45; }
.status { display:inline-block; margin-top:8px; padding:3px 7px; border-radius:999px; font-size:11px; border:1px solid var(--border); }
.status-sold-out, .status-cancelled { background:#7f1d1d; color:white; border-color:#7f1d1d; }
.status-wait-list { background:#92400e; color:white; border-color:#92400e; }
.status-available { background:#14532d; color:white; border-color:#14532d; }
.card a { color:inherit; }
.card a:hover, .card a:focus, .agenda-table a:hover, .agenda-table a:focus, td a:hover, td a:focus { color:var(--link-hover); background:var(--link-hover-bg); text-decoration:underline; text-decoration-thickness:2px; outline:2px solid transparent; border-radius:3px; }
.group-heading { margin: 24px 0 8px; font-size: 19px; position: sticky; top: 120px; z-index: 1; background: var(--bg); padding: 8px 12px; border-bottom: 1px solid var(--border);}
.empty { padding:16px; border:1px dashed var(--border); border-radius:12px; color:var(--muted); font-size:13px; }
.table-wrap { overflow-x:auto; background:var(--card); border:1px solid var(--border); border-radius:14px; margin-bottom: 2rem;}
.agenda-table { table-layout:fixed; width:100%; }
.agenda-table col.col-link { width:52%; }
.agenda-table col.col-date { width:24%; }
.agenda-table col.col-venue { width:24%; }
.agenda-table th, .agenda-table td { padding:5px 7px; font-size:12px; }
.agenda-table a { color:inherit; }
.agenda-mobile-venue { display:none; margin-top:3px; color:var(--muted); font-size:11px; line-height:1.3; }
table { width:100%; border-collapse:collapse; font-size:12px; }
th, td { padding:7px 9px; border-bottom:1px solid var(--border); text-align:left; vertical-align:top; }
th { background:var(--bg); }
tbody tr:nth-child(even) { background:rgba(127,127,127,0.08); }
tbody tr:nth-child(odd) { background:transparent; }
tbody tr:hover, tbody tr:focus-within { background:var(--hover); }
tr:last-child td { border-bottom:0; }
@media (max-width: 700px) {
  .agenda-table col.col-link { width:62%; }
  .agenda-table col.col-date { width:38%; }
  .agenda-table col.col-venue { width:0; }
  .agenda-table th:nth-child(3), .agenda-table td:nth-child(3) { display:none; }
  .agenda-table th, .agenda-table td { font-size:11px; padding:5px 6px; }
  .agenda-mobile-venue { display:block; }
  .group-heading { top:188px;}
}
ul.smallPls {font-size: 11px; padding-bottom: 15px;}
.smallPls li {padding: 2px;}
.back-to-top { position:fixed; left:50%; bottom:18px; transform:translateX(-50%); z-index:3; color:inherit; text-decoration:none; border:1px solid var(--border); background:var(--card); padding:7px 10px; border-radius:999px; font-size:12px; box-shadow:0 2px 10px rgba(0,0,0,.12); }
.back-to-top:hover, .back-to-top:focus { background:var(--card); border-color:var(--muted); text-decoration:none; transform:translateX(-50%) translateY(-2px); }
</style>

", "city": "Canberra", "lat": -35.2418729, "lon": 149.0601357, "count": 0}];
const MAP_CITIES = ["Albury", "Canberra", "Queanbeyan", "Sydney", "Wollongong"];

const DEFAULT_CENTRES = {
  "Albury": [-36.0808, 146.9165],
  "Canberra": [-35.2809, 149.1300],
  "Queanbeyan": [-35.3549, 149.2330],
  "Sydney": [-33.8688, 151.2093],
  "Wollongong": [-34.4278, 150.8931]
};

function slug(value) {
  return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

for (const city of MAP_CITIES) {
  const el = document.getElementById(`map-${slug(city)}`);
  if (!el) continue;

  const cityVenues = VENUES.filter(v => v.city === city);
  const centre = DEFAULT_CENTRES[city] || [-35.2809, 149.1300];
  const map = L.map(el).setView(centre, 12);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const markers = [];

  for (const venue of cityVenues) {
    const marker = L.marker([venue.lat, venue.lon]).addTo(map);

    const directionsUrl =
        "https://www.google.com/maps/dir/?api=1&destination=" +
        encodeURIComponent(venue.lat + "," + venue.lon);

    const eventsLink = venue.count > 0
    ? '<br><a href="by-location.html#' +
        slug(venue.city + ' ' + venue.name) +
        '">View events</a>'
    : '';

    marker.bindPopup(
        '<strong>' + venue.name + '</strong><br>' +
        venue.count + ' event' + (venue.count === 1 ? '' : 's') +
        eventsLink +
        '<br><a href="' + directionsUrl + '" target="_blank" rel="noopener">Get directions</a>'
    );

    markers.push(marker);
     }

  if (markers.length) {
    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.18));
  }
}

<script>
const currentFile = location.pathname.split('/').pop() || 'index.html';
document.querySelectorAll('nav a').forEach(link => {
  const hrefFile = link.getAttribute('href').split('/').pop();
  if (hrefFile === currentFile) link.classList.add('active');
});
const search = document.querySelector('#search');
const city = document.querySelector('#city');
const status = document.querySelector('#status');
function applyFilters() {
  document.querySelectorAll('.card').forEach(card => {
    const text = card.innerText.toLowerCase();
    const matchesSearch = !search || text.includes(search.value.toLowerCase());
    const matchesCity = !city || !city.value || card.dataset.city === city.value;
    const matchesStatus = !status || !status.value || card.dataset.status === status.value;
    card.style.display = matchesSearch && matchesCity && matchesStatus ? '' : 'none';
  });
}
[search, city, status].forEach(el => el && el.addEventListener('input', applyFilters));
</script>
